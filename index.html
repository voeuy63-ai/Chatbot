<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForestSMP - OTP</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body {
            background: linear-gradient(135deg, #1e5e2f 0%, #0a2e16 100%);
            height: 100vh;
            display: flex; justify-content: center; align-items: center; color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px; border-radius: 20px;
            width: 350px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        img { width: 90px; margin-bottom: 10px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 8px; border: none;
            background: rgba(255, 255, 255, 0.2); color: white; text-align: center;
        }
        button {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: #4ade80; color: #061f0e; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.postimg.cc/j5Z8X00r/20260503-205959.png" alt="Logo">
    <h2>ForestSMP</h2>
    <input type="email" id="email" placeholder="Enter Email">
    <button onclick="sendOTP()">SEND CODE</button>
    <input type="text" id="otp" placeholder="Enter OTP" style="margin-top: 20px;">
    <button onclick="verifyOTP()" style="background: #fbbf24;">VERIFY NOW</button>
</div>

<script>
    // ប្តូរ Link ខាងក្រោមនេះ តាម Link ពណ៌ស្វាយក្នុង Render របស់អ្នក
    const API_URL = 'https://email-unp0.onrender.com'; 

    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true
    });

    async function sendOTP() {
        const email = document.getElementById('email').value;
        if(!email) return Toast.fire({ icon: 'warning', title: 'Please enter email!' });
        
        Toast.fire({ title: 'Sending...', didOpen: () => { Swal.showLoading() } });

        try {
            const res = await fetch(`${API_URL}/send-otp`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email })
            });
            const msg = await res.text();
            Toast.fire({ icon: res.ok ? 'success' : 'error', title: msg });
        } catch (e) {
            Toast.fire({ icon: 'error', title: 'Server is offline!' });
        }
    }

    async function verifyOTP() {
        const email = document.getElementById('email').value;
        const otp = document.getElementById('otp').value;
        try {
            const res = await fetch(`${API_URL}/verify-otp`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, otp })
            });
            const msg = await res.text();
            Toast.fire({ icon: res.ok ? 'success' : 'error', title: msg });
        } catch (e) {
            Toast.fire({ icon: 'error', title: 'Connection error!' });
        }
    }
</script>
</body>
</html>
